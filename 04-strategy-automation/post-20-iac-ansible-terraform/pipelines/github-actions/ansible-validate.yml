name: ansible-validate

on:
  pull_request:
    paths:
      - "04-strategy-automation/post-20-iac-ansible-terraform/ansible/**"
      - "04-strategy-automation/post-20-iac-ansible-terraform/scripts/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: 04-strategy-automation/post-20-iac-ansible-terraform/ansible
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible pywinrm pypsrp ansible-lint
          ansible-galaxy collection install -r requirements.yml

      - name: Lint playbooks
        run: ansible-lint playbooks

      - name: Syntax check
        run: ansible-playbook -i inventory/hosts.ini.example playbooks/configure-hyperv-host.yml --syntax-check

      - name: Dry run host baseline
        run: ansible-playbook -i inventory/hosts.ini.example playbooks/configure-hyperv-host.yml --check
